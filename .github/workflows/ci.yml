name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx nuxi typecheck

      - name: Build
        run: npx nuxi build
        env:
          NUXT_GITHUB_CLIENT_ID: dummy
          NUXT_GITHUB_CLIENT_SECRET: dummy
          NUXT_COOKIE_ENCRYPTION_SECRET: ci-test-secret-32-characters-long
